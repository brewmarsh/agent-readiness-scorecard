name: Agent Advisor

on:
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 9 * * 1' # Runs every Monday at 9am (Weekly Audit)

jobs:
  check-branch:
    name: 🚩 Branch Enforcement
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - name: Verify Base Branch
        run: |
          if [ "${{ github.head_ref }}" != "beta" ]; then
            echo "🛑 ERROR: All Pull Requests to 'main' must originate from the 'beta' branch."
            echo "Current head branch: ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ Branch check passed: PR from 'beta' to 'main'."

  analyze:
    needs: [check-branch]
    if: |
      always() &&
      (needs.check-branch.result == 'success' || needs.check-branch.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Needed to comment on PRs
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Agent Scorecard
        run: pip install .

      - name: Run Advisor Analysis
        id: advisor
        # Output to a file so we can read it into the step summary
        run: |
          agent-score advise --output agent_report.md
          
      - name: Post Summary to GitHub
        if: always()
        run: |
          cat agent_report.md >> $GITHUB_STEP_SUMMARY
