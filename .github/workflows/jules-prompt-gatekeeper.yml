name: Scorecard Automation

on:
  push:
    branches:
      - beta  # Changed from main to beta
  schedule:
    - cron: '0 0 * * *'

jobs:
  remediate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: beta # Ensure we check out beta to start the analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Run Agent Scorecard
        run: uv run agent-score score . --verbosity summary > scorecard.txt

      - name: Process Scorecard Output
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: uv run python scripts/process_scorecard.py scorecard.txt

      - name: Apply Type Hints (Simulation)
        run: |
          # ... (Logic remains same, ensures changes happen on a branch from beta)

      - name: Create Pull Request for Type Hints
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          base: beta # CRITICAL: Sets beta as the destination for the PR
          commit-message: "chore: Auto-apply type hints from AI Scorecard"
          title: "chore: Auto-apply type hints from AI Scorecard"
          body: |
            ### 🤖 AI Scorecard Remediation
            Targeting **beta** branch for integration.
          branch: auto-type-hints
          delete-branch: true
          labels: |
            ai-ready
            automated-refactor
            prompt-check
